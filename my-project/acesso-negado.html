<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Acesso negado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site-theme.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "IBM Plex Sans", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(248, 46, 50, 0.12), transparent 35%),
        radial-gradient(circle at bottom left, rgba(31, 86, 188, 0.24), transparent 40%),
        linear-gradient(180deg, #e2e8f0 0%, #ffffff 45%, #d7e0ea 100%);
    }

    .denied-card {
      width: min(480px, 100%);
      padding: 34px;
      border-radius: 28px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.16);
      text-align: center;
    }

    .denied-seal {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(248, 46, 50, 0.14);
      color: #9f1239;
      font-family: "Oswald", sans-serif;
      font-size: 2rem;
    }

    .denied-kicker {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.76);
    }

    h1 {
      margin: 0;
      font-family: "Oswald", sans-serif;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1;
    }

    p {
      margin: 14px 0 0;
      color: rgba(0, 0, 0, 0.7);
      line-height: 1.7;
    }

    .denied-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .denied-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .denied-button--primary {
      background: linear-gradient(135deg, #6ddd3a, #1f56bc);
      color: #111111;
    }

    .denied-button--secondary {
      border: 1px solid rgba(0, 0, 0, 0.12);
      color: #111111;
      background: rgba(109, 221, 58, 0.08);
    }
  </style>
</head>
<body>
  <main class="denied-card" aria-live="polite">
    <div class="denied-seal" aria-hidden="true">!</div>
    <span class="denied-kicker">HBX</span>
    <h1>Acesso negado</h1>
    <p>
      Esta area administrativa so pode ser aberta por uma entrada protegida do HBX com sessao valida.
    </p>
    <p id="deniedReason">
      Se voce chegou aqui por link direto ou com sessao expirada, volte ao fluxo do HBX e gere uma nova entrada.
    </p>
    <div class="denied-actions">
      <a class="denied-button denied-button--primary" href="index.html">Ir para o site</a>
    </div>
  </main>

  <script>
    (function () {
      const deniedReason = document.getElementById('deniedReason');
      const reason = new URLSearchParams(window.location.search).get('reason');

      if (reason) {
        deniedReason.textContent = reason;
      }
    })();
  </script>
</body>
</html>
