<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento aprovado</title>
  <style>
    :root {
      --bg: #0f8f45;
      --bg-soft: #17ad57;
      --card: #ffffff;
      --text: #0c4021;
      --muted: #1e5f36;
      --ok: #1db954;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.2), transparent 42%),
        linear-gradient(145deg, var(--bg), var(--bg-soft));
      padding: 20px;
    }

    .card {
      width: min(640px, 100%);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 28px 60px rgba(4, 38, 18, 0.26);
      padding: 28px 24px;
      text-align: center;
    }

    .badge {
      width: 92px;
      height: 92px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #40d671, #16a34a);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1;
      box-shadow: 0 14px 30px rgba(12, 121, 58, 0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.2vw, 2.2rem);
      color: #10743a;
    }

    .copy {
      margin: 14px auto 0;
      max-width: 520px;
      font-size: clamp(1rem, 2.3vw, 1.15rem);
      color: var(--muted);
      line-height: 1.5;
    }

    .preview {
      display: block;
      width: min(290px, 92%);
      margin: 18px auto 14px;
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(7, 39, 19, 0.18);
    }

    .status {
      display: inline-block;
      margin-top: 4px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(29, 185, 84, 0.14);
      color: #0f6f37;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .redirect {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #2e6f47;
    }
  </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZRS8VTKTMK">
</script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-ZRS8VTKTMK');
</script>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">V</div>
    <h1>Sucesso</h1>
    <p class="copy">O guincho Rio Claro agradece, em breve o responsavel chegara no ponto combinado.</p>
    <img class="preview" src="/img/cartao-de-credito.png" alt="Cartao de credito">
    <p id="status" class="status">Validando aprovacao do pagamento...</p>
    <p class="redirect">Voltando para a pagina inicial em <strong id="countdown">5</strong> segundos.</p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const requestId = params.get('requestId') || params.get('external_reference') || '';
    const paymentId = params.get('payment_id') || params.get('collection_id') || '';
    const providerStatus = (params.get('status') || params.get('collection_status') || '').toLowerCase();
    const statusEl = document.getElementById('status');
    const countdownEl = document.getElementById('countdown');

    function startCountdown() {
      let remaining = 5;
      countdownEl.textContent = String(remaining);
      const timer = window.setInterval(() => {
        remaining -= 1;
        countdownEl.textContent = String(Math.max(remaining, 0));
        if (remaining <= 0) {
          window.clearInterval(timer);
          window.location.href = '/index.html';
        }
      }, 1000);
    }

    async function validateApproval() {
      if (providerStatus === 'approved') {
        statusEl.textContent = 'Pagamento aprovado no Mercado Pago.';
      }

      if (!paymentId && !requestId) {
        if (providerStatus !== 'approved') {
          statusEl.textContent = 'Retorno recebido. Confirmacao oficial em andamento.';
        }
        startCountdown();
        return;
      }

      try {
        const query = new URLSearchParams();
        if (paymentId) query.set('payment_id', paymentId);
        if (requestId) query.set('requestId', requestId);

        const response = await fetch(`/api/mercadopago/verify-return?${query.toString()}`, {
          method: 'GET'
        });
        const data = await response.json();

        if (response.ok && data.ok && data.approved) {
          statusEl.textContent = 'Pagamento aprovado no Mercado Pago.';
          startCountdown();
          return;
        }

        statusEl.textContent = 'Pagamento recebido. A confirmacao final sera atualizada no painel.';
      } catch (error) {
        statusEl.textContent = 'Nao foi possivel validar agora. O painel continua monitorando o webhook.';
      }

      startCountdown();
    }

    validateApproval();
  </script>
</body>
</html>
